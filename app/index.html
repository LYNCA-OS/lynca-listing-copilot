<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LYNCA Listing Copilot</title>
    <link rel="icon" type="image/svg+xml" href="/app/favicon.svg">
    <link rel="stylesheet" href="/app/listing-copilot.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="app-header">
        <a class="brand" href="/" aria-label="LYNCA Listing Copilot">
          <span class="brand-mark">LYN</span>
          <span>LYNCA Listing Copilot</span>
        </a>
        <div class="header-actions">
          <button class="ghost-button" type="button" id="resetButton">清空</button>
        </div>
      </header>

      <main class="workspace">
        <section class="workspace-intro">
          <p class="eyebrow">写手工作台</p>
          <h1>卡牌标题生成</h1>
          <p class="subtitle">上传图片，检查并确认一段式英文标题。</p>
        </section>

        <section class="runtime-contract" hidden aria-hidden="true">
          <p id="providerStatusText">正在读取服务端配置。</p>
          <div id="providerControl"></div>
          <label><input type="radio" name="assetMode" value="pair" checked>两图配对</label>
        </section>

        <section class="control-panel">
          <label class="drop-zone" for="imageInput" id="dropZone">
            <input id="imageInput" type="file" accept=".jpg,.jpeg,.png,.webp,.heic,.heif,image/jpeg,image/png,image/webp,image/heic,image/heif" multiple>
            <strong>拖入卡片图片</strong>
            <span id="statusText" role="status" aria-live="polite">每两张图片组成一张卡；最后一张会单独处理。</span>
          </label>
          <div class="primary-actions">
            <label class="secondary-button" for="imageInput">选择图片</label>
            <button class="primary-button" type="button" id="processButton" disabled>生成标题</button>
          </div>
        </section>

        <section class="batch-summary" aria-label="处理进度">
          <span>图片 <strong id="statImages">0</strong></span>
          <span>卡片 <strong id="statAssets">0</strong></span>
          <span>完成 <strong id="statProcessed">0</strong></span>
          <span>失败 <strong id="statFailed">0</strong></span>
          <div hidden aria-hidden="true">
            <strong id="statHigh">0</strong>
            <strong id="statMedium">0</strong>
            <strong id="statLow">0</strong>
            <strong id="statRequests">0</strong>
            <strong id="statCost">$0.000</strong>
          </div>
        </section>

        <section class="asset-workbench">
          <div class="asset-board">
            <div class="section-head">
              <div>
                <h2>标题</h2>
                <p id="previewSummary">等待上传图片。</p>
              </div>
            </div>
            <div class="asset-preview-list" id="assetPreviewList">
              <div class="empty-state">选择图片后，卡片会按上传顺序出现在这里。</div>
            </div>
          </div>
        </section>

        <section class="batch-titles-panel" aria-label="全部标题">
          <div class="batch-titles-board">
            <div class="section-head">
              <div>
                <h2>全部标题</h2>
              </div>
              <div class="batch-actions">
                <button class="copy-button" type="button" id="copyAllButton" disabled>复制全部</button>
                <button class="copy-button" type="button" id="exportWorkbookButton" disabled>导出 Excel</button>
              </div>
            </div>
            <p class="export-workbook-status" id="exportWorkbookStatus" role="status" aria-live="polite"></p>
            <ol class="batch-title-list" id="batchTitleList">
              <li class="batch-empty">生成后可在这里统一复制或导出。</li>
            </ol>
          </div>
        </section>
      </main>
    </div>

    <div class="image-modal" id="imageModal" aria-hidden="true">
      <div class="image-modal-backdrop" data-modal-close></div>
      <section class="image-modal-panel" role="dialog" aria-modal="true" aria-labelledby="imageModalTitle">
        <header class="image-modal-header">
          <div>
            <p class="eyebrow" id="imageModalSide">图片预览</p>
            <h2 id="imageModalTitle">卡片图片</h2>
          </div>
          <button class="icon-button" type="button" id="imageModalClose" aria-label="关闭图片预览">×</button>
        </header>
        <div class="image-modal-stage">
          <img id="imageModalImage" alt="">
        </div>
        <footer class="image-modal-footer">
          <div class="image-modal-switcher" id="imageModalSwitcher" aria-label="图片切换"></div>
          <p id="imageModalFileName"></p>
        </footer>
      </section>
    </div>

    <script src="/app/listing-copilot.js" type="module"></script>
  </body>
</html>
