<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LYNCA Listing Copilot 登录</title>
    <link rel="icon" type="image/svg+xml" href="/app/favicon.svg">
    <link rel="stylesheet" href="/app/listing-copilot.css">
  </head>
  <body class="login-page login-shell">
    <main class="login-stage">
      <section class="login-card" aria-label="LYNCA Listing Copilot 管理员预览登录">
        <div class="login-identity">
          <span class="brand-mark">LYN</span>
          <span>
            <strong>LYNCA Listing Copilot</strong>
            <small>隔离预览工作区</small>
          </span>
        </div>
        <div class="login-copy">
          <p class="eyebrow">正式环境入口</p>
          <h1>登录</h1>
          <p class="subtitle" id="legacyLoginHelp">请输入你的账号与密码进行登录，或前往注册链接创建新账号。</p>
        </div>
        <form class="listing-login-form" id="listingLoginForm" autocomplete="on">
          <label>
            <span>账号</span>
            <input id="username" name="username" type="text" autocomplete="username" aria-describedby="legacyLoginHelp loginError" required autofocus>
          </label>
          <label>
            <span>密码</span>
            <input id="password" name="password" type="password" autocomplete="current-password" aria-describedby="legacyLoginHelp loginError" required>
          </label>
          <label hidden>
            <span>客户空间</span>
            <select id="tenant_id" name="tenant_id"></select>
          </label>
          <p class="form-error" id="loginError" role="alert" aria-live="polite"></p>
          <button class="primary-button" id="loginButton" type="submit" aria-busy="false">登录</button>
          <p class="auth-note"><a href="/register" class="primary-button auth-link">没有账号？去注册</a></p>
        </form>
      </section>
    </main>
    <script src="/app/login.js" type="module"></script>
  </body>
</html>
