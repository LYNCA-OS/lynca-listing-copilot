name: reviewed-title-accuracy-smoke

on:
  workflow_dispatch: {}

concurrency:
  group: reviewed-title-accuracy-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      actions: read
    env:
      API_BASE_URL: https://listing.lyncafei.team
      METAVERSE_USERNAME: ${{ secrets.METAVERSE_USERNAME }}
      METAVERSE_PASSWORD: ${{ secrets.METAVERSE_PASSWORD }}
      DATASET_PATH: /tmp/reviewed-title-blind.json
      SEALED_LABELS_PATH: /tmp/reviewed-title-sealed-labels.jsonl
      REPORT_PATH: /tmp/reviewed-title-accuracy-report.json
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Collect prior reviewed-title evaluation history
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/collect-ebay-evaluation-history.mjs \
            --github \
            --artifact-names reviewed-title-accuracy-report \
            --id-fields source_feedback_id \
            --output-field source_feedback_id \
            --out /tmp/reviewed-title-history.jsonl
      - name: Build random sealed reviewed-title sample
        run: |
          node scripts/build-reviewed-title-blind-eval.mjs \
            --source data/catalog/vector-seed/feedback-writer-gt-seed-dataset.json \
            --exclude "data/recognition/review/supabase-feedback-regression-30-field-review-packet.json,/tmp/reviewed-title-history.jsonl" \
            --out "$DATASET_PATH" \
            --sealed-labels-out "$SEALED_LABELS_PATH" \
            --limit 10 \
            --selection-seed "reviewed-${{ github.run_id }}-${{ github.run_attempt }}" \
            --sample-mode random_blind
      - name: Prove blind input and random-sample provenance
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const dataset = JSON.parse(fs.readFileSync(process.env.DATASET_PATH, 'utf8'));
          const labels = fs.readFileSync(process.env.SEALED_LABELS_PATH, 'utf8').trim().split(/\n/).filter(Boolean).map(JSON.parse);
          const datasetText = fs.readFileSync(process.env.DATASET_PATH, 'utf8');
          const checks = {
            exact_count: dataset.item_count === 10 && labels.length === 10,
            random_sample_provenance: dataset.evaluation_sample_policy?.mode === 'RANDOM_BLIND'
              && dataset.evaluation_sample_policy?.randomized_selection === true
              && dataset.evaluation_sample_policy?.randomization_verified === true,
            reviewed_titles_absent: labels.every((label) => !datasetText.includes(String(label.reviewed_title || ''))),
            image_only: dataset.intake_policy?.image_only === true && dataset.items.every((item) => item.images?.length > 0),
            self_retrieval_exclusion: dataset.items.every((item) => item.source_feedback_id && item.source_record?.self_retrieval_exclusion_required === true)
          };
          console.log(JSON.stringify(checks, null, 2));
          if (Object.values(checks).some((value) => value !== true)) process.exit(1);
          NODE
      - name: Run locked reviewed-10 launch gate
        run: |
          node scripts/run-launch-gate-eval.mjs \
            --profile reviewed-10 \
            --dataset "$DATASET_PATH" \
            --sealed-labels "$SEALED_LABELS_PATH" \
            --base-url "$API_BASE_URL" \
            --expected-deployment-sha "${{ github.sha }}" \
            --think-ms 0 \
            --l2-wait-ms 240000 \
            --request-timeout-ms 120000 \
            --out "$REPORT_PATH"
      - name: Enforce technical and evaluation integrity
        run: |
          node - <<'NODE'
          const report = require(process.env.REPORT_PATH);
          const technical = report.technical_summary || {};
          const internal = report.strata?.internal_reviewed_gt || {};
          const formal = internal.formal_accuracy || {};
          const weak = report.strata?.ebay_weak_label || {};
          const gate = report.formal_accuracy_gate || {};
          const observed = report.execution_contract?.observed_checks || {};
          const deployment = report.execution_contract?.deployment || {};
          const nodes = technical.pipeline_node_observability || {};
          const checks = {
            exact_reviewed_10: technical.attempted_count === 10 && internal.attempted_count === 10,
            all_cards_complete: technical.completed_count === technical.attempted_count,
            reviewed_gt_only: internal.formal_accuracy?.eligible === true && weak.attempted_count === 0,
            measured_count_matches_cohort: formal.measured_count === 10
              && formal.measured_count === report.data_contract?.cohort_counts?.internal_reviewed_gt,
            reviewed_accuracy_gate: gate.passed === true
              && gate.required_correct_count === 9
              && formal.correct_count >= 9
              && formal.rate >= 0.87,
            ebay_diagnostics_only: weak.formal_accuracy_eligible === false
              && !Object.hasOwn(weak, 'formal_accuracy'),
            sample_provenance: report.data_contract?.sample_provenance?.verified === true,
            pipeline_ledgers: nodes.ledger_present_count === technical.attempted_count,
            no_transport_errors: Number(nodes.transport_error_count || 0) === 0,
            no_missing_required_nodes: Number(nodes.missing_required_node_count || 0) === 0,
            locked_execution_observed: Object.values(observed).length > 0 && Object.values(observed).every((value) => value === true),
            self_retrieval_exclusion: report.data_contract?.self_retrieval_exclusion?.preflight_verified === true,
            deployment_stable: report.execution_contract?.deployment?.drift?.unchanged === true,
            expected_deployment_sha: deployment.expected?.deployment_sha === process.env.GITHUB_SHA
              && deployment.start?.deployment_sha === process.env.GITHUB_SHA
              && deployment.end?.deployment_sha === process.env.GITHUB_SHA,
            no_combined_formal_accuracy: report.accuracy_reporting_policy?.combined_formal_accuracy_prohibited === true
              && report.accuracy_reporting_policy?.combined_formal_accuracy === null
          };
          console.log(JSON.stringify({
            checks,
            technical,
            internal_reviewed_gt: internal,
            execution: report.execution_contract,
            accuracy_reporting_policy: report.accuracy_reporting_policy
          }, null, 2));
          if (Object.values(checks).some((value) => value !== true)) process.exit(1);
          NODE
      - name: Upload detailed evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: reviewed-title-accuracy-report
          retention-days: 30
          path: |
            /tmp/reviewed-title-accuracy-report.json
            /tmp/reviewed-title-sealed-labels.jsonl
            /tmp/reviewed-title-history.jsonl
