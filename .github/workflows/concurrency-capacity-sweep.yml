name: concurrency-capacity-sweep

# Measures writer-visible production throughput under controlled offered load.
# Each level uses a disjoint fresh blind sample and per-card polling so the
# client never has more than cN cards in flight. The backend remains on its
# production capacity controller (two keys, stable per-key limit) throughout.
on:
  workflow_dispatch:
    inputs:
      levels:
        description: "Comma-separated offered-load levels (current production: 1,2,3; confirmation: 2,3)"
        default: "1,2,3"
      cards_per_level:
        description: "Fresh blind cards per concurrency level"
        default: "6"
      model:
        description: "Production model"
        default: "gpt-5-mini"
      think_ms:
        description: "Simulated writer think time (ms)"
        default: "5000"

concurrency:
  group: concurrency-capacity-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      API_BASE_URL: https://listing.lyncafei.team
      METAVERSE_USERNAME: ${{ secrets.METAVERSE_USERNAME }}
      METAVERSE_PASSWORD: ${{ secrets.METAVERSE_PASSWORD }}
      RUN_ID: concurrency-${{ github.run_id }}
      BLIND_DIR: /tmp/lynca-concurrency-blind
      DATASET_PATH: /tmp/concurrency-all-dataset.json
      SEALED_LABELS_PATH: /tmp/concurrency-all-sealed-labels.jsonl
      COMPARISON_PATH: /tmp/concurrency-comparison.json
      SWEEP_LEVELS: ${{ inputs.levels }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Validate production control plane
        run: |
          curl -fsS --max-time 30 "$API_BASE_URL/api/v4/health" -o /tmp/v4-health.json
          curl -fsS --max-time 30 -c /tmp/lynca-cookies.txt \
            -H 'content-type: application/json' \
            --data "$(node -e 'process.stdout.write(JSON.stringify({username:process.env.METAVERSE_USERNAME,password:process.env.METAVERSE_PASSWORD}))')" \
            "$API_BASE_URL/api/login" -o /tmp/login.json
          curl -fsS --max-time 45 -b /tmp/lynca-cookies.txt \
            "$API_BASE_URL/api/listing-provider-status" -o /tmp/provider-status.json
          node - <<'NODE'
          const fs = require('fs');
          const health = JSON.parse(fs.readFileSync('/tmp/v4-health.json', 'utf8'));
          const status = JSON.parse(fs.readFileSync('/tmp/provider-status.json', 'utf8'));
          const execution = status.execution_control || {};
          const levels = String(process.env.SWEEP_LEVELS || '').split(',').map(Number).filter((value) => Number.isInteger(value) && value > 0);
          const maximumLevel = Math.max(...levels);
          const checks = {
            v4_ready: health.ready === true,
            queue_ready: health.production_queue?.configured === true,
            distributed_capacity: execution.distributed_provider_capacity_enabled === true,
            model_matches: (status.providers || []).some((provider) => provider.selectable && provider.model_id === '${{ inputs.model }}'),
            key_pool_two_or_more: Number(execution.provider_key_pool_size || 0) >= 2,
            production_global_capacity_covers_sweep: Number(execution.global_provider_concurrency || 0) >= maximumLevel
          };
          fs.writeFileSync('/tmp/concurrency-readiness.json', JSON.stringify({ checks, execution, levels, maximum_level:maximumLevel }, null, 2));
          console.log(JSON.stringify({ checks, execution, levels, maximum_level:maximumLevel }, null, 2));
          if (Object.values(checks).some((value) => value !== true)) process.exit(1);
          NODE
      - name: Prepare fresh sealed blind sample
        run: |
          LEVEL_COUNT=$(node -e "const v=process.env.SWEEP_LEVELS.split(',').map(Number).filter(n=>Number.isInteger(n)&&n>0); if(!v.length||new Set(v).size!==v.length) process.exit(1); process.stdout.write(String(v.length))")
          TOTAL=$((LEVEL_COUNT * ${{ inputs.cards_per_level }}))
          node scripts/prepare-dcsports87-blind-eval.mjs \
            --base-url "$API_BASE_URL" \
            --out-dir "$BLIND_DIR" \
            --run-id "$RUN_ID" \
            --limit "$TOTAL" \
            --image-limit 2 \
            --include-non-sports \
            --exclude-sealed-products \
            --allow-partial \
            --query "sports card|basketball card|baseball card|football card|soccer card|hockey card|Pokemon card|One Piece card|Yu-Gi-Oh card" \
            --exclude-answer-keys "data/eval/ebay-reference/ebay-c100-sealed-labels-20260707.jsonl,data/eval/ebay-reference/ebay-fresh-smoke-exclusions.jsonl"
      - name: Upload image-only intake bundle
        run: |
          LEVEL_COUNT=$(node -e "process.stdout.write(String(process.env.SWEEP_LEVELS.split(',').map(Number).filter(n=>Number.isInteger(n)&&n>0).length))")
          TOTAL=$((LEVEL_COUNT * ${{ inputs.cards_per_level }}))
          node scripts/build-ebay-image-intake-dataset.mjs \
            --blind-dir "$BLIND_DIR" \
            --run-ids "$RUN_ID" \
            --out "$DATASET_PATH" \
            --sealed-labels-out "$SEALED_LABELS_PATH" \
            --limit "$TOTAL" \
            --upload-images --progress \
            --base-url "$API_BASE_URL"
      - name: Build balanced disjoint concurrency strata
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const dataset = JSON.parse(fs.readFileSync(process.env.DATASET_PATH, 'utf8'));
          const labels = fs.readFileSync(process.env.SEALED_LABELS_PATH, 'utf8').trim().split(/\n/).filter(Boolean).map(JSON.parse);
          const requestedCardsPerLevel = Number('${{ inputs.cards_per_level }}');
          const levels = String(process.env.SWEEP_LEVELS || '').split(',').map(Number).filter((value) => Number.isInteger(value) && value > 0);
          if (!levels.length || new Set(levels).size !== levels.length) throw new Error(`Invalid levels: ${process.env.SWEEP_LEVELS}`);
          const items = Array.isArray(dataset.items) ? dataset.items : [];
          const cardsPerLevel = Math.min(requestedCardsPerLevel, Math.floor(items.length / levels.length));
          const required = cardsPerLevel * levels.length;
          if (cardsPerLevel < 2) throw new Error(`Only ${items.length} fresh cards were prepared; at least ${levels.length * 2} are required.`);
          const labelByKey = new Map(labels.map((label) => [String(label.key || ''), label]));
          const seenAssets = new Set();
          const seenKeys = new Set();
          const manifest = { schema_version:'concurrency-strata-v2', cards_per_level:cardsPerLevel, requested_levels:levels, levels:{} };
          for (const [levelIndex, level] of levels.entries()) {
            const group = items.filter((_, index) => index % levels.length === levelIndex).slice(0, cardsPerLevel);
            if (group.length !== cardsPerLevel) throw new Error(`c${level} has ${group.length}/${cardsPerLevel} cards.`);
            const groupLabels = group.map((item) => {
              const asset = String(item.asset_id || '');
              const key = String(item.sealed_eval_label_ref?.key || item.source_record?.sealed_eval_label_key || '');
              if (!asset || seenAssets.has(asset)) throw new Error(`Duplicate or missing asset in c${level}: ${asset}`);
              if (!key || seenKeys.has(key) || !labelByKey.has(key)) throw new Error(`Duplicate or missing sealed key in c${level}: ${key}`);
              seenAssets.add(asset);
              seenKeys.add(key);
              return labelByKey.get(key);
            });
            const output = {
              ...dataset,
              generated_at: new Date().toISOString(),
              item_count: group.length,
              unique_item_count: group.length,
              sealed_labels_path: `/tmp/concurrency-c${level}-sealed-labels.jsonl`,
              concurrency_experiment: { level, offered_load_limit: level, stratum: level, cards_per_level: cardsPerLevel },
              items: group
            };
            fs.writeFileSync(`/tmp/concurrency-c${level}-dataset.json`, JSON.stringify(output, null, 2));
            fs.writeFileSync(`/tmp/concurrency-c${level}-sealed-labels.jsonl`, groupLabels.map((row) => JSON.stringify(row)).join('\n') + '\n');
            manifest.levels[`c${level}`] = { assets: group.map((item) => item.asset_id), sealed_keys: groupLabels.map((label) => label.key) };
          }
          manifest.total_unique_assets = seenAssets.size;
          manifest.total_unique_labels = seenKeys.size;
          manifest.requested_cards_per_level = requestedCardsPerLevel;
          manifest.blind_inputs_verified = items.slice(0, required).every((item) => !String(item.canonical_title || '').trim() && Object.keys(item.source_titles || {}).length === 0 && item.source_record?.seller_title_visible_to_model === false);
          fs.writeFileSync('/tmp/concurrency-strata.json', JSON.stringify(manifest, null, 2));
          fs.appendFileSync(process.env.GITHUB_ENV, `ACTUAL_CARDS_PER_LEVEL=${cardsPerLevel}\n`);
          console.log(JSON.stringify(manifest, null, 2));
          if (!manifest.blind_inputs_verified || seenAssets.size !== required || seenKeys.size !== required) process.exit(1);
          NODE
      - name: Warm production path
        run: |
          for _ in 1 2 3; do
            curl -s -o /dev/null --max-time 20 "$API_BASE_URL/api/health" || true
          done
      - name: Run controlled offered-load sweep
        run: |
          set -euo pipefail
          IFS=',' read -ra LEVELS <<< "$SWEEP_LEVELS"
          EXECUTED_LEVELS=()
          for LEVEL in "${LEVELS[@]}"; do
            LEVEL="$(echo "$LEVEL" | xargs)"
            echo "Running c${LEVEL} with at most ${LEVEL} cards in flight"
            node scripts/v4-ebay-smoke.mjs \
              --dataset "/tmp/concurrency-c${LEVEL}-dataset.json" \
              --sealed-labels "/tmp/concurrency-c${LEVEL}-sealed-labels.jsonl" \
              --limit "$ACTUAL_CARDS_PER_LEVEL" \
              --concurrency "$LEVEL" \
              --queue --speculative --use-preingestion --prewarm --per-card-poll \
              --model "${{ inputs.model }}" \
              --think-ms "${{ inputs.think_ms }}" \
              --l2-wait-ms 180000 \
              --request-timeout-ms 120000 \
              --out "/tmp/concurrency-c${LEVEL}-report.json"
            EXECUTED_LEVELS+=("$LEVEL")
            if ! LEVEL="$LEVEL" node - <<'NODE'
            const fs = require('fs');
            const level = process.env.LEVEL;
            const report = JSON.parse(fs.readFileSync(`/tmp/concurrency-c${level}-report.json`, 'utf8'));
            const summary = report.summary || {};
            const nodes = summary.pipeline_node_observability || {};
            const results = Array.isArray(report.results) ? report.results : [];
            const errorText = results.map((row) => [
              row.error,
              row.error_code,
              row.provider_error_type,
              row.provider_response_status,
              row.job_status
            ].filter(Boolean).join(' ')).join(' ').toLowerCase();
            const stopReasons = [];
            if (Number(summary.ok_count || 0) !== Number(summary.attempted_count || 0)) stopReasons.push('TECHNICAL_SUCCESS_NOT_100_PERCENT');
            if (Number(summary.retry_card_count || summary.provider_error_retry_count || 0) > 0) stopReasons.push('PAID_RETRY_REQUIRED');
            if (Number(summary.retry_attempt_count || 0) > 0) stopReasons.push('RETRY_ATTEMPT_REQUIRED');
            if (Number(nodes.error_count || 0) > 0) stopReasons.push('NODE_RECONCILIATION_ERROR');
            if (Number(nodes.missing_required_node_count || 0) > 0) stopReasons.push('REQUIRED_NODE_MISSING');
            if (Number(nodes.ledger_present_count || 0) !== Number(summary.attempted_count || 0)) stopReasons.push('NODE_LEDGER_INCOMPLETE');
            if (/(?:http\s*)?429|rate[_ -]?limit/.test(errorText)) stopReasons.push('RATE_LIMIT_429');
            if (/time(?:d)?\s*out|timeout/.test(errorText)) stopReasons.push('TIMEOUT');
            const decision = { level:Number(level), stop:stopReasons.length > 0, stop_reasons:stopReasons };
            console.log(JSON.stringify(decision));
            if (decision.stop) process.exit(1);
            NODE
            then
              echo "Stopping sweep after unstable c${LEVEL}; higher load would only waste paid calls."
              break
            fi
            sleep 15
          done
          EXECUTED_SWEEP_LEVELS="$(IFS=,; echo "${EXECUTED_LEVELS[*]}")"
          echo "EXECUTED_SWEEP_LEVELS=$EXECUTED_SWEEP_LEVELS" >> "$GITHUB_ENV"
          echo "Executed levels: $EXECUTED_SWEEP_LEVELS"
      - name: Compare stability and throughput
        run: |
          IFS=',' read -ra LEVELS <<< "${EXECUTED_SWEEP_LEVELS:-$SWEEP_LEVELS}"
          REPORT_ARGS=()
          for LEVEL in "${LEVELS[@]}"; do
            LEVEL="$(echo "$LEVEL" | xargs)"
            REPORT_ARGS+=("--report=${LEVEL}:/tmp/concurrency-c${LEVEL}-report.json")
          done
          node scripts/compare-concurrency-sweep.mjs "${REPORT_ARGS[@]}" --out "$COMPARISON_PATH"
          node - <<'NODE'
          const comparison = require(process.env.COMPARISON_PATH);
          for (const row of comparison.rows) {
            console.log(JSON.stringify({
              concurrency:row.concurrency,
              stable:row.stable,
              cards_per_minute:row.completed_cards_per_minute,
              policy_adjusted_cards_per_minute:row.policy_adjusted_cards_per_minute,
              policy_avg:row.policy_fair_title_token_recall_avg,
              pass72:`${row.pass_at_0_72_count}/${row.attempted_count}`,
              writer_p50_ms:row.writer_ready_p50_ms,
              writer_p95_ms:row.writer_ready_p95_ms,
              queue_p95_ms:row.scheduler_queue_wait_p95_ms,
              queue_tail_share:row.queue_tail_share,
              writer_tail_amplification:row.writer_tail_amplification,
              provider_p95_ms:row.provider_latency_p95_ms,
              bottleneck_node:row.bottleneck_node_id,
              bottleneck_p95_ms:row.bottleneck_node_p95_ms,
              bottleneck_share:row.bottleneck_share_of_writer_p95,
              request_headroom_min_ratio:row.request_headroom_min_ratio,
              token_headroom_min_ratio:row.token_headroom_min_ratio,
              provider_key_slot_distribution:row.provider_key_slot_distribution,
              provider_key_slot_imbalance:row.provider_key_slot_imbalance,
              catalog_p95_ms:row.catalog_retrieval_p95_ms,
              vector_p95_ms:row.vector_retrieval_p95_ms,
              post_observation_retrieval_deadline_p95_ms:row.post_observation_retrieval_deadline_p95_ms,
              post_observation_retrieval_deferred_card_count:row.post_observation_retrieval_deferred_card_count,
              post_observation_retrieval_completed_within_budget_count:row.post_observation_retrieval_completed_within_budget_count,
              ocr_p95_ms:row.ocr_wait_p95_ms,
              retries:row.retry_card_count,
              errors:row.technical_failure_count,
              node_errors:row.node_error_count,
              tokens:row.total_tokens,
              tokens_per_card:row.tokens_per_completed_card,
              input_tokens_per_card:row.input_tokens_per_completed_card,
              output_tokens_per_card:row.output_tokens_per_completed_card,
              rejection_reasons:row.rejection_reasons,
              warning_reasons:row.warning_reasons
            }));
          }
          console.log(`recommended_concurrency=${comparison.recommended_concurrency}`);
          console.log(`confidence=${comparison.recommendation_confidence}`);
          if (!comparison.recommended_concurrency) process.exit(1);
          NODE
      - name: Enforce technical integrity
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const levels = String(process.env.EXECUTED_SWEEP_LEVELS || process.env.SWEEP_LEVELS || '').split(',').map(Number).filter((value) => Number.isInteger(value) && value > 0);
          for (const level of levels) {
            const report = JSON.parse(fs.readFileSync(`/tmp/concurrency-c${level}-report.json`, 'utf8'));
            const summary = report.summary || {};
            const nodes = summary.pipeline_node_observability || {};
            if (summary.ok_count !== summary.attempted_count) throw new Error(`c${level}: technical completion failed`);
            if (nodes.ledger_present_count !== summary.attempted_count) throw new Error(`c${level}: node ledger incomplete`);
            if (Number(nodes.error_count || 0) !== 0) throw new Error(`c${level}: node reconciliation error`);
            if (Number(nodes.missing_required_node_count || 0) !== 0) throw new Error(`c${level}: required node missing`);
          }
          NODE
      - name: Upload detailed evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: concurrency-capacity-sweep
          retention-days: 30
          path: |
            /tmp/concurrency-readiness.json
            /tmp/concurrency-strata.json
            /tmp/concurrency-comparison.json
            /tmp/concurrency-c*-report.json
            /tmp/concurrency-c*-report.tsv
            /tmp/concurrency-c*-dataset.json
            /tmp/concurrency-c*-sealed-labels.jsonl
            /tmp/lynca-concurrency-blind/${{ env.RUN_ID }}/blind_dataset_manifest.json
