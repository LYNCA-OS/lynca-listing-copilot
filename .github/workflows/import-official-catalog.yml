name: import-official-catalog

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Validated official source manifest"
        type: choice
        options:
          - topps
          - leaf
          - panini
          - upper_deck
          - one_piece
          - digimon
          - dragon_ball_fusion_world
          - dragon_ball_masters
          - battle_spirits
          - wotc_gatherer
        default: topps
      apply:
        description: "Apply validated rows to production Supabase"
        type: boolean
        default: false
      source_name:
        description: "Exact manifest source_name; blank validates all sources"
        type: string
        required: false
        default: ""

concurrency:
  group: official-catalog-production-${{ inputs.provider }}
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Fail closed for production writes outside current main
        env:
          APPLY_OFFICIAL_CATALOG: ${{ inputs.apply }}
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
        run: |
          if [[ "$APPLY_OFFICIAL_CATALOG" != "true" ]]; then
            exit 0
          fi
          test "$DISPATCH_REF" = "refs/heads/main"
          git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main
          test "$(git rev-parse HEAD)" = "$DISPATCH_SHA"
          test "$(git rev-parse origin/main)" = "$DISPATCH_SHA"
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Validate the complete production manifest set
        run: node scripts/audit-official-catalog-manifest-parity.mjs --repository-only --out /tmp/official-catalog-manifest-repository.json
      - name: Validate and import official sources
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OFFICIAL_CATALOG_PROVIDER: ${{ inputs.provider }}
          APPLY_OFFICIAL_CATALOG: ${{ inputs.apply }}
          OFFICIAL_CATALOG_SOURCE_NAME: ${{ inputs.source_name }}
        run: |
          manifest="data/catalog/official/${OFFICIAL_CATALOG_PROVIDER}-production-sources.json"
          test -f "$manifest"
          args=(--manifest "$manifest" --out /tmp/official-catalog-import.json)
          if [[ -n "$OFFICIAL_CATALOG_SOURCE_NAME" ]]; then
            args+=(--only-source-name "$OFFICIAL_CATALOG_SOURCE_NAME")
          fi
          if [[ "$APPLY_OFFICIAL_CATALOG" == "true" ]]; then
            test -n "$SUPABASE_URL"
            test -n "$SUPABASE_SERVICE_ROLE_KEY"
            args+=(--apply)
          fi
          node scripts/import-official-source-manifest.mjs "${args[@]}"
      - name: Prove post-apply idempotence
        if: inputs.apply
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OFFICIAL_CATALOG_PROVIDER: ${{ inputs.provider }}
          OFFICIAL_CATALOG_SOURCE_NAME: ${{ inputs.source_name }}
        run: |
          manifest="data/catalog/official/${OFFICIAL_CATALOG_PROVIDER}-production-sources.json"
          args=(--manifest "$manifest" --out /tmp/official-catalog-idempotence.json --apply)
          if [[ -n "$OFFICIAL_CATALOG_SOURCE_NAME" ]]; then
            args+=(--only-source-name "$OFFICIAL_CATALOG_SOURCE_NAME")
          fi
          node scripts/import-official-source-manifest.mjs "${args[@]}"
          node - <<'NODE'
          const report = require('/tmp/official-catalog-idempotence.json');
          const failures = report.apply_reports.filter(row => (
            row.verified_existing_source_count !== 1
            || row.inserted_source_count !== 0
            || row.refreshed_source_count !== 0
            || row.recovered_partial_source_count !== 0
            || row.inserted_staging_count !== 0
            || row.inserted_product_count !== 0
            || row.inserted_set_count !== 0
            || row.inserted_card_count !== 0
          ));
          console.log(JSON.stringify({
            valid: report.validation.valid && failures.length === 0,
            source_count: report.apply_reports.length,
            failures
          }, null, 2));
          if (!report.validation.valid || failures.length) process.exit(1);
          NODE
      - name: Prove repository and production catalog parity
        if: inputs.apply
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node scripts/audit-official-catalog-manifest-parity.mjs --out /tmp/official-catalog-manifest-parity.json
          node scripts/catalog-operational-coverage.mjs --out /tmp/catalog-operational-coverage.json
          node - <<'NODE'
          const parity = require('/tmp/official-catalog-manifest-parity.json');
          const coverage = require('/tmp/catalog-operational-coverage.json');
          const sourceGraphValid = coverage.summary.unattributed_catalog_entity_count === 0
            && coverage.summary.broken_source_reference_count === 0
            && coverage.summary.orphan_catalog_card_count === 0
            && coverage.summary.unregistered_source_type_count === 0;
          console.log(JSON.stringify({
            parity_valid: parity.valid,
            parity_summary: parity.summary,
            source_graph_valid: sourceGraphValid,
            source_graph: coverage.summary,
            tcg_demand_summary: coverage.tcg_demand_coverage.summary,
            tcg_demand_gaps: coverage.tcg_demand_coverage.families
              .filter(row => row.reviewed_demand_count > 0 && row.coverage_state !== 'CARD_CODE_ANCHORS_COVERED')
              .sort((left, right) => right.reviewed_demand_count - left.reviewed_demand_count)
          }, null, 2));
          if (!parity.valid || !sourceGraphValid) process.exit(1);
          NODE
      - name: Prove every official source remains retrievable
        if: inputs.apply
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ENABLE_CATALOG_RETRIEVAL: "true"
        run: node scripts/audit-official-catalog-retrieval-sentinels.mjs --out /tmp/official-catalog-retrieval-sentinels.json
      - name: Summarize
        run: |
          node - <<'NODE'
          const report = require('/tmp/official-catalog-import.json');
          console.log(JSON.stringify({
            manifest_path: report.manifest_path,
            apply: report.apply,
            selection: report.selection,
            valid: report.validation.valid,
            sources: report.validation.validations.map(row => ({
              source_name: row.source_name,
              source_type: row.actual_source_type,
              extraction_method: row.extraction_method,
              parsed_card_count: row.parsed_card_count,
              record_checks: row.record_checks
            })),
            applied_source_count: report.apply_reports.length,
            applied: report.apply_reports.map(row => ({
              source_type: row.source_type,
              inserted_card_count: row.inserted_card_count,
              verified_existing_source_count: row.verified_existing_source_count,
              refreshed_source_count: row.refreshed_source_count,
              recovered_partial_source_count: row.recovered_partial_source_count
            }))
          }, null, 2));
          if (!report.validation.valid) process.exit(1);
          NODE
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: official-catalog-import-report-${{ inputs.provider }}
          path: |
            /tmp/official-catalog-import.json
            /tmp/official-catalog-idempotence.json
            /tmp/official-catalog-manifest-repository.json
            /tmp/official-catalog-manifest-parity.json
            /tmp/catalog-operational-coverage.json
            /tmp/official-catalog-retrieval-sentinels.json
