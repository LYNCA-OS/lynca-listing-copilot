name: provider-transport-ablation

# Runs the same fresh, sealed, image-only cards through the standard and sparse
# provider transports. Identity cache is disabled for both arms so the second
# arm cannot inherit the first arm's answer.
on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Fresh paired cards"
        default: "3"
      model:
        description: "Identical model for both arms"
        default: "gpt-5-mini"
      transport_pair:
        description: "Paired transport profiles"
        type: choice
        default: "standard_vs_compact"
        options:
          - standard_vs_compact
          - compact_vs_ultra_fast
          - ultra_high_vs_auto
          - ultra_high_vs_low
          - ultra_v1_vs_v2
          - writer_ready_vs_provider_done_handoff
      ultra_image_detail:
        description: "Ultra-fast GPT image detail"
        type: choice
        default: "auto"
        options:
          - auto
          - low
          - high
      ultra_service_tier:
        description: "Ultra-fast OpenAI service tier"
        type: choice
        default: "unset"
        options:
          - unset
          - priority
          - default
          - auto
          - flex

concurrency:
  group: provider-transport-ablation
  cancel-in-progress: false

jobs:
  ablation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      API_BASE_URL: https://listing.lyncafei.team
      METAVERSE_USERNAME: ${{ secrets.METAVERSE_USERNAME }}
      METAVERSE_PASSWORD: ${{ secrets.METAVERSE_PASSWORD }}
      RUN_ID: provider-transport-${{ github.run_id }}
      BLIND_DIR: /tmp/lynca-provider-transport
      DATASET_PATH: /tmp/provider-transport-dataset.json
      SEALED_LABELS_PATH: /tmp/provider-transport-sealed-labels.jsonl
      BASELINE_REPORT_PATH: /tmp/provider-transport-standard.json
      COMPACT_REPORT_PATH: /tmp/provider-transport-compact.json
      COMPARISON_REPORT_PATH: /tmp/provider-transport-comparison.json
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Validate production runtime
        run: |
          curl -fsS --max-time 30 "$API_BASE_URL/api/v4/health" -o /tmp/v4-health.json
          node - <<'NODE'
          const health = require('/tmp/v4-health.json');
          const expectedSha = process.env.GITHUB_SHA;
          const deployedSha = String(health.deployment?.git_commit_sha || '');
          if (health.ready !== true) throw new Error('production V4 runtime is not ready');
          if (!deployedSha || deployedSha !== expectedSha) {
            throw new Error(`production deployment mismatch: expected ${expectedSha}, received ${deployedSha || 'missing'}`);
          }
          NODE
      - name: Prepare fresh sealed blind inputs once
        run: |
          node scripts/prepare-dcsports87-blind-eval.mjs \
            --base-url "$API_BASE_URL" \
            --out-dir "$BLIND_DIR" \
            --run-id "$RUN_ID" \
            --limit "${{ inputs.limit }}" \
            --image-limit 2 \
            --include-non-sports \
            --exclude-answer-keys "data/eval/ebay-reference/ebay-c100-sealed-labels-20260707.jsonl,data/eval/ebay-reference/ebay-fresh-smoke-exclusions.jsonl"
          node scripts/build-ebay-image-intake-dataset.mjs \
            --blind-dir "$BLIND_DIR" \
            --run-ids "$RUN_ID" \
            --out "$DATASET_PATH" \
            --sealed-labels-out "$SEALED_LABELS_PATH" \
            --limit "${{ inputs.limit }}" \
            --upload-images \
            --progress \
            --base-url "$API_BASE_URL"
      - name: Prove both arms receive image-only inputs
        run: |
          node - <<'NODE'
          const dataset = require(process.env.DATASET_PATH);
          const items = Array.isArray(dataset.items) ? dataset.items : [];
          const blind = items.length === Number('${{ inputs.limit }}')
            && items.every((item) => !String(item.canonical_title || '').trim())
            && items.every((item) => Object.keys(item.source_titles || {}).length === 0)
            && items.every((item) => item.source_record?.seller_title_visible_to_model === false);
          if (!blind) throw new Error('paired transport dataset is not blind');
          NODE
      - name: Run baseline transport
        run: |
          EXTRA_FLAGS=()
          if [[ "${{ inputs.transport_pair }}" == "compact_vs_ultra_fast" ]]; then
            EXTRA_FLAGS+=(--compact-l2)
          elif [[ "${{ inputs.transport_pair }}" == ultra_high_vs_* || "${{ inputs.transport_pair }}" == "ultra_v1_vs_v2" || "${{ inputs.transport_pair }}" == "writer_ready_vs_provider_done_handoff" ]]; then
            EXTRA_FLAGS+=(--ultra-fast-l2 --ultra-image-detail high --ultra-service-tier priority)
          fi
          node scripts/v4-ebay-smoke.mjs \
            --dataset "$DATASET_PATH" \
            --sealed-labels "$SEALED_LABELS_PATH" \
            --limit "${{ inputs.limit }}" \
            --concurrency 2 \
            --queue --speculative --use-preingestion \
            --preingestion-source "$RUN_ID-baseline" \
            --disable-identity-cache \
            "${EXTRA_FLAGS[@]}" \
            --model "${{ inputs.model }}" \
            --think-ms 0 \
            --l2-wait-ms 120000 \
            --out "$BASELINE_REPORT_PATH"
      - name: Run candidate transport
        run: |
          EXTRA_FLAGS=(--compact-l2)
          if [[ "${{ inputs.transport_pair }}" == "compact_vs_ultra_fast" ]]; then
            EXTRA_FLAGS=(--ultra-fast-l2 --ultra-image-detail "${{ inputs.ultra_image_detail }}")
            if [[ "${{ inputs.ultra_service_tier }}" != "unset" ]]; then
              EXTRA_FLAGS+=(--ultra-service-tier "${{ inputs.ultra_service_tier }}")
            fi
          elif [[ "${{ inputs.transport_pair }}" == "ultra_high_vs_auto" ]]; then
            EXTRA_FLAGS=(--ultra-fast-l2 --ultra-image-detail auto --ultra-service-tier priority)
          elif [[ "${{ inputs.transport_pair }}" == "ultra_high_vs_low" ]]; then
            EXTRA_FLAGS=(--ultra-fast-l2 --ultra-image-detail low --ultra-service-tier priority)
          elif [[ "${{ inputs.transport_pair }}" == "ultra_v1_vs_v2" ]]; then
            EXTRA_FLAGS=(--ultra-fast-l2 --ultra-sparse-v2 --ultra-image-detail high --ultra-service-tier priority)
          elif [[ "${{ inputs.transport_pair }}" == "writer_ready_vs_provider_done_handoff" ]]; then
            EXTRA_FLAGS=(--ultra-fast-l2 --ultra-image-detail high --ultra-service-tier priority --provider-done-handoff)
          fi
          node scripts/v4-ebay-smoke.mjs \
            --dataset "$DATASET_PATH" \
            --sealed-labels "$SEALED_LABELS_PATH" \
            --limit "${{ inputs.limit }}" \
            --concurrency 2 \
            --queue --speculative --use-preingestion \
            --preingestion-source "$RUN_ID-candidate" \
            --disable-identity-cache \
            "${EXTRA_FLAGS[@]}" \
            --model "${{ inputs.model }}" \
            --think-ms 0 \
            --l2-wait-ms 120000 \
            --out "$COMPACT_REPORT_PATH"
      - name: Compare paired outcomes
        run: |
          node scripts/compare-provider-transport-ablation.mjs \
            --baseline "$BASELINE_REPORT_PATH" \
            --compact "$COMPACT_REPORT_PATH" \
            --out "$COMPARISON_REPORT_PATH"
          node - <<'NODE'
          const comparison = require(process.env.COMPARISON_REPORT_PATH);
          const pair = '${{ inputs.transport_pair }}';
          const detailPair = pair.startsWith('ultra_high_vs_');
          const sparsePair = pair === 'ultra_v1_vs_v2';
          const handoffPair = pair === 'writer_ready_vs_provider_done_handoff';
          const expectedBaselineMode = detailPair || sparsePair || handoffPair ? 'v4_ultra_fast_l2' : (pair === 'compact_vs_ultra_fast' ? 'v4_compact_l2' : 'fast_initial');
          const expectedCandidateMode = detailPair || sparsePair || handoffPair || pair === 'compact_vs_ultra_fast' ? 'v4_ultra_fast_l2' : 'v4_compact_l2';
          const expectedBaselineDetail = detailPair ? 'high' : 'high';
          const expectedCandidateDetail = pair === 'ultra_high_vs_auto'
            ? 'auto'
            : pair === 'ultra_high_vs_low'
              ? 'low'
              : pair === 'compact_vs_ultra_fast'
                ? '${{ inputs.ultra_image_detail }}'
                : 'high';
          const expectedRequestedTier = detailPair || sparsePair || handoffPair ? 'priority' : (pair === 'compact_vs_ultra_fast' ? '${{ inputs.ultra_service_tier }}' : 'unset');
          console.log(`paired=${comparison.complete_pair_count}/${comparison.paired_count}`);
          console.log(`writer_p50 standard=${comparison.baseline.writer_ready_p50_ms} compact=${comparison.compact.writer_ready_p50_ms} delta=${comparison.deltas.writer_ready_p50_fraction}`);
          console.log(`provider_p50 standard=${comparison.baseline.provider_latency_p50_ms} compact=${comparison.compact.provider_latency_p50_ms} delta=${comparison.deltas.provider_latency_p50_fraction}`);
          console.log(`queue_p95 standard=${comparison.baseline.scheduler_queue_wait_p95_ms} compact=${comparison.compact.scheduler_queue_wait_p95_ms} delta=${comparison.deltas.scheduler_queue_wait_p95_fraction}`);
          console.log(`cards_per_minute standard=${comparison.baseline.completed_cards_per_minute} compact=${comparison.compact.completed_cards_per_minute} delta=${comparison.deltas.completed_cards_per_minute_fraction}`);
          console.log(`tokens standard=${comparison.baseline.total_tokens_total} compact=${comparison.compact.total_tokens_total}`);
          console.log(`weak_proxy recoveries=${comparison.recovery_count} regressions=${comparison.regression_count}`);
          if (comparison.complete_pair_count !== Number('${{ inputs.limit }}')) process.exit(1);
          if (!handoffPair && (comparison.baseline.transport_node_error_count !== 0 || comparison.compact.transport_node_error_count !== 0)) process.exit(1);
          if (handoffPair && comparison.compact.transport_node_error_count !== 0) process.exit(1);
          if (comparison.baseline.identity_cache_hit_count !== 0 || comparison.compact.identity_cache_hit_count !== 0) process.exit(1);
          if (comparison.baseline.identity_cache_bypassed_count !== Number('${{ inputs.limit }}')) process.exit(1);
          if (comparison.compact.identity_cache_bypassed_count !== Number('${{ inputs.limit }}')) process.exit(1);
          if (Number(comparison.baseline.prompt_mode_breakdown?.[expectedBaselineMode] || 0) !== Number('${{ inputs.limit }}')) process.exit(1);
          if (Number(comparison.compact.prompt_mode_breakdown?.[expectedCandidateMode] || 0) !== Number('${{ inputs.limit }}')) process.exit(1);
          if (detailPair && Number(comparison.baseline.image_detail_breakdown?.[expectedBaselineDetail] || 0) !== Number('${{ inputs.limit }}')) process.exit(1);
          if (Number(comparison.compact.image_detail_breakdown?.[expectedCandidateDetail] || 0) !== Number('${{ inputs.limit }}')) process.exit(1);
          if (sparsePair && Number(comparison.baseline.response_profile_breakdown?.compact_sparse_v1 || 0) !== Number('${{ inputs.limit }}')) process.exit(1);
          if (sparsePair && Number(comparison.compact.response_profile_breakdown?.compact_sparse_v2 || 0) !== Number('${{ inputs.limit }}')) process.exit(1);
          if (expectedRequestedTier !== 'unset' && Number(comparison.compact.requested_service_tier_breakdown?.[expectedRequestedTier] || 0) !== Number('${{ inputs.limit }}')) process.exit(1);
          if (handoffPair && Number(comparison.baseline.provider_done_capacity_release_count || 0) !== 0) process.exit(1);
          if (handoffPair && Number(comparison.compact.provider_done_capacity_release_count || 0) !== Number('${{ inputs.limit }}')) process.exit(1);
          if (handoffPair && Number(comparison.compact.capacity_refill_triggered_count || 0) !== Number('${{ inputs.limit }}')) process.exit(1);
          if (handoffPair && Number(comparison.compact.capacity_refill_missing_count || 0) !== 0) process.exit(1);
          NODE
      - name: Upload sealed paired artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: provider-transport-ablation
          retention-days: 30
          path: |
            /tmp/provider-transport-dataset.json
            /tmp/provider-transport-sealed-labels.jsonl
            /tmp/provider-transport-standard.json
            /tmp/provider-transport-compact.json
            /tmp/provider-transport-comparison.json
            /tmp/lynca-provider-transport/${{ env.RUN_ID }}/blind_dataset_manifest.json
