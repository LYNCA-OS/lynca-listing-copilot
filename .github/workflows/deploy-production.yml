name: deploy-production

on:
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false
      - name: Install and verify release artifact
        run: |
          npm ci --no-audit --no-fund
          npm audit --omit=dev --audit-level=moderate
          npm run check:v4-spine
          npm run test:v4-spine
      - name: Trigger current main through the Vercel Deploy Hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          test -n "$VERCEL_DEPLOY_HOOK_URL"
          curl -fsS --max-time 30 -X POST "$VERCEL_DEPLOY_HOOK_URL" \
            -o /tmp/vercel-deploy-hook.json
          node - <<'NODE'
          const response = require('/tmp/vercel-deploy-hook.json');
          if (!response.job?.id || !['PENDING', 'RUNNING', 'BUILDING'].includes(response.job?.state)) {
            console.error(JSON.stringify({ state: response.job?.state || null, has_job_id: Boolean(response.job?.id) }));
            process.exit(1);
          }
          console.log(JSON.stringify({ deploy_hook_accepted: true, state: response.job.state }));
          NODE
      - name: Wait for the exact main commit to reach production
        run: |
          for _attempt in $(seq 1 60); do
            if curl -fsS --max-time 30 https://listing.lyncafei.team/api/v4/health \
              -o /tmp/v4-health-deployed.json \
              && node -e 'const h=require("/tmp/v4-health-deployed.json"); process.exit(h.deployment?.git_commit_sha === process.env.GITHUB_SHA ? 0 : 1)'; then
              break
            fi
            rm -f /tmp/v4-health-deployed.json
            sleep 10
          done
          test -s /tmp/v4-health-deployed.json
          node -e 'const h=require("/tmp/v4-health-deployed.json"); if(h.deployment?.git_commit_sha !== process.env.GITHUB_SHA) process.exit(1)'
      - name: Apply and verify production schema migrations
        env:
          V4_JOB_WORKER_SECRET: ${{ secrets.V4_JOB_WORKER_SECRET }}
        run: |
          test -n "$V4_JOB_WORKER_SECRET"
          curl -fsS --max-time 45 \
            -H "x-lynca-worker-secret: $V4_JOB_WORKER_SECRET" \
            -X POST \
            https://listing.lyncafei.team/api/admin-apply-v4-writer-export-migration \
            -o /tmp/writer-export-migration.json
          node -e 'const r=require("/tmp/writer-export-migration.json"); if(r.ok!==true) process.exit(1)'
          curl -fsS --max-time 45 \
            -H "x-lynca-worker-secret: $V4_JOB_WORKER_SECRET" \
            -X POST \
            https://listing.lyncafei.team/api/admin-apply-v4-noncritical-persistence-migration \
            -o /tmp/noncritical-persistence-migration.json
          node -e 'const r=require("/tmp/noncritical-persistence-migration.json"); if(r.ok!==true) process.exit(1)'
          curl -fsS --max-time 45 \
            -H "x-lynca-worker-secret: $V4_JOB_WORKER_SECRET" \
            -X POST \
            https://listing.lyncafei.team/api/admin-apply-v4-writer-ready-capacity-migration \
            -o /tmp/writer-ready-capacity-migration.json
          node -e 'const r=require("/tmp/writer-ready-capacity-migration.json"); if(r.ok!==true) process.exit(1)'
      - name: Verify production alias and V4 runtime
        env:
          METAVERSE_USERNAME: ${{ secrets.METAVERSE_USERNAME }}
          METAVERSE_PASSWORD: ${{ secrets.METAVERSE_PASSWORD }}
        run: |
          # A migration can commit milliseconds before PostgREST exposes the
          # new tables to a different Vercel region. Wait for the complete
          # readiness contract, not only for the deployment SHA.
          for _attempt in $(seq 1 36); do
            if curl -fsS --max-time 30 https://listing.lyncafei.team/api/v4/health -o /tmp/v4-health.json \
              && node -e 'const h=require("/tmp/v4-health.json"); process.exit(h.ready === true && h.deployment?.git_commit_sha === process.env.GITHUB_SHA ? 0 : 1)'; then
              break
            fi
            rm -f /tmp/v4-health.json
            sleep 10
          done
          test -s /tmp/v4-health.json
          curl -fsS --max-time 30 -c /tmp/lynca-cookies.txt \
            -H 'content-type: application/json' \
            --data "$(node -e 'process.stdout.write(JSON.stringify({username:process.env.METAVERSE_USERNAME,password:process.env.METAVERSE_PASSWORD}))')" \
            https://listing.lyncafei.team/api/login -o /tmp/login.json
          curl -fsS --max-time 45 -b /tmp/lynca-cookies.txt \
            https://listing.lyncafei.team/api/listing-provider-status -o /tmp/provider-status.json
          node - <<'NODE'
          const fs = require('fs');
          const health = JSON.parse(fs.readFileSync('/tmp/v4-health.json', 'utf8'));
          const status = JSON.parse(fs.readFileSync('/tmp/provider-status.json', 'utf8'));
          const components = new Map((status.workflow_readiness?.components || []).map((item) => [item.id, item]));
          const vector = components.get('vector_retrieval') || {};
          const vision = components.get('vision_provider') || {};
          const checks = {
            v4_ready: health.ready === true,
            deployed_commit_matches: health.deployment?.git_commit_sha === process.env.GITHUB_SHA,
            queue_configured: health.production_queue?.configured === true,
            cloud_recognition_ready: status.workflow_readiness?.can_run_cloud_recognition === true,
            model_ready: vision.details?.model_id === 'gpt-5-mini',
            vector_index_ready: vector.details?.index_ready === true,
            vector_runtime_ready: vector.details?.runtime_ready === true && vector.details?.preload_status === 'READY'
          };
          console.log(JSON.stringify({ checks, deployment_sha: process.env.GITHUB_SHA }, null, 2));
          if (Object.values(checks).some((value) => value !== true)) process.exit(1);
          NODE
      - name: Enforce writer-assisted production readiness
        env:
          METAVERSE_USERNAME: ${{ secrets.METAVERSE_USERNAME }}
          METAVERSE_PASSWORD: ${{ secrets.METAVERSE_PASSWORD }}
        run: node scripts/writer-assisted-production-readiness.mjs --cloud --out /tmp/writer-assisted-readiness.json
      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: production-release-evidence
          path: |
            /tmp/v4-health.json
            /tmp/v4-health-deployed.json
            /tmp/provider-status.json
            /tmp/vercel-deploy-hook.json
            /tmp/writer-export-migration.json
            /tmp/noncritical-persistence-migration.json
            /tmp/writer-ready-capacity-migration.json
            /tmp/writer-assisted-readiness.json
