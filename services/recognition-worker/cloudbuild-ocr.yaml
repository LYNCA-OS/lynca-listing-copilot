steps:
  - name: gcr.io/cloud-builders/docker
    args: ["pull", "${_CACHE_IMAGE}"]
    allowFailure: true
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --cache-from
      - ${_CACHE_IMAGE}
      - --tag
      - ${_IMAGE_URI}
      - --tag
      - ${_CACHE_IMAGE}
      - --file
      - Dockerfile
      - .
    timeout: 2400s
  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_IMAGE_URI}"]
  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_CACHE_IMAGE}"]

images:
  - ${_IMAGE_URI}

options:
  machineType: E2_HIGHCPU_8
  diskSizeGb: 100

timeout: 2700s
